title: Stimulsoft Reports Documentation
description:
baseurl: "/Stimulsoft.Server.Manual"
url: "https://stimulsoft.github.io"
sidebar_title: "Stimulsoft Server User Manual"

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter

relative_links:
  enabled: true
  collections: false

defaults:
  - scope:
      path: ""
    values:
      layout: default
      render_with_liquid: false

exclude:
  - scripts/
  - "*.py"
  - README.md
  - ARCHITECTURE.md
  - Gemfile
  - Gemfile.lock
